<html>
  <head>
    <meta charset="UTF-8">  
    <title>Power Leveling UI Web version</title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

    <script type="text/javascript">

      function cycleSlots(){
        var names=new Array
        var sourceIDs=new Array

        //load unchecked names to variable
        for (var i=1; i<=15; i++){
          var tCkb = document.getElementById('ckb' + i.toString());
          if (!tCkb.checked){
            txtName = document.getElementById('txtName' + i.toString())
            var tName = txtName.value;
            txtName.value='';
            if (tName!=''){
              names.push(tName);
            }
          }
        }
      
        //cycleNames()
        var tName = names.shift();
        names.push(tName);

        curSlot=1;
        while(names.length > 0){
          tName = names.shift();
          while(document.getElementById('ckb' + curSlot.toString()).checked){curSlot++;}
          document.getElementById('txtName' + curSlot.toString()).value = tName;
          curSlot++;
        }

        document.getElementById('GBlvl').value=parseInt(document.getElementById('GBlvl').value)+1
        updateSlots()
      }

      function copyToClipboard(){

        let copyText = ""
        let gbName = document.getElementById('GB').value;
        let gbLvl = document.getElementById('GBlvl').value;
        let gbOwner = document.getElementById('ownerName').value;
        let ownerCost = document.getElementById('ownerCost').value

        copyText += gbOwner + " " + window.gbShort[gbName] + " " + (gbLvl - 1) + " → " + (gbLvl) + "\n"
        for (var i=1; i<=5; i++) {
          copyText += "P" + i 
          if (document.getElementById('ckb' + i.toString()).checked) {
            copyText += String.fromCodePoint(0x1F512);
          }
          copyText += ") " + document.getElementById('txtName' + i.toString()).value + " " + document.getElementById('invest' + i.toString()).value + "\n"
        }
        copyText += "(self: " + ownerCost + ")"

        //navigator.clipboard.writeText(copyText);
        try {
          navigator.clipboard.writeText(copyText);
        } catch(err) {
          let clipBox = document.getElementById('toClip');
          clipBox.value = copyText;
          clipBox.focus();
          clipBox.select();
          document.execCommand('copy');
        }

        
      }

      function updateSlots(){
        let gbName = document.getElementById('GB').value;
        let gbLvl = parseInt(document.getElementById('GBlvl').value);
        /*let mult = document.getElementById('GBmult').value;*/

        if (!gbName || !gbLvl ){return 0}

        let lvlData = window.gbData.gbsData[gbName].levels[gbLvl - 1]

        let ownerCost = lvlData.cost

        for (var i=1; i<=5; i++){
          let mult = document.getElementById('investmult' + i.toString()).value;
          let slotCost = Math.ceil(lvlData.reward[ i - 1 ].fp * mult);
          if (slotCost == 0) slotCost = 1;
          document.getElementById('invest' + i.toString()).value = slotCost;
          ownerCost -= slotCost
        }

        document.getElementById('ownerCost').value = ownerCost
      }
    </script>
